name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Create an orphan branch to wipe history
          git checkout --orphan latest_branch
          git add -A
          git commit -m "Auto-sync from GitHub"
          # Force push the new branch as 'main' to HF
          git push --force https://aalveeaarham2003:$HF_TOKEN@huggingface.co/spaces/aalveeaarham2003/ecocycle-api latest_branch:main
